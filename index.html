<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сравнение УСН и АУСН — EFSOL</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f5f6f8;
      color: #1a1a2e;
      padding: 24px 16px 48px;
      font-size: 15px;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ── Input panel ── */
    .input-panel {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .input-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #333;
    }

    .fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      font-size: 15px;
      transition: border-color .15s;
      outline: none;
      background: #fafbfc;
    }

    .field input:focus { border-color: #4f6ef7; background: #fff; }

    /* org toggle */
    .org-toggle {
      display: flex;
      gap: 0;
      border: 1.5px solid #dde1ea;
      border-radius: 8px;
      overflow: hidden;
    }

    .org-toggle input { display: none; }

    .org-toggle label {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      transition: background .15s, color .15s;
      margin: 0;
    }

    .org-toggle input:checked + label {
      background: #4f6ef7;
      color: #fff;
    }

    .btn-calc {
      background: #4f6ef7;
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-calc:hover { background: #3a5ae0; }

    /* ── Results ── */
    #results { display: none; }

    .winner-banner {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff;
      border-radius: 12px;
      padding: 18px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 4px 16px rgba(46,204,113,.3);
    }

    .winner-banner .icon { font-size: 28px; }

    .winner-banner .text strong {
      font-size: 17px;
      display: block;
      margin-bottom: 2px;
    }

    .winner-banner .text span { font-size: 13px; opacity: .9; }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      border: 2px solid transparent;
      position: relative;
      transition: box-shadow .15s;
    }

    .card.best {
      border-color: #2ecc71;
      box-shadow: 0 4px 20px rgba(46,204,113,.2);
    }

    .card .badge {
      display: none;
      position: absolute;
      top: -10px;
      right: 14px;
      background: #2ecc71;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .card.best .badge { display: block; }

    .card .regime {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
    }

    .card .total {
      font-size: 26px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 16px;
      line-height: 1.1;
    }

    .card.best .total { color: #27ae60; }

    .card .rows { border-top: 1px solid #eee; padding-top: 12px; }

    .card .row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      color: #555;
      padding: 4px 0;
    }

    .card .row.sub {
      padding-left: 12px;
      color: #999;
      font-size: 12px;
    }

    .card .row .val { font-weight: 500; color: #333; }

    /* comparison table */
    .compare-section h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #333;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      font-size: 14px;
    }

    .compare-table th {
      background: #f0f2f8;
      padding: 10px 14px;
      text-align: right;
      font-weight: 600;
      font-size: 12px;
      color: #555;
      white-space: nowrap;
    }

    .compare-table th:first-child { text-align: left; }

    .compare-table td {
      padding: 9px 14px;
      text-align: right;
      border-top: 1px solid #f0f2f8;
      white-space: nowrap;
    }

    .compare-table td:first-child { text-align: left; color: #555; }

    .compare-table tr.total-row td {
      font-weight: 700;
      font-size: 15px;
      background: #f8f9fb;
    }

    .compare-table td.best-col { color: #27ae60; font-weight: 600; }

    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Сравнение налоговых режимов</h1>
  <p class="subtitle">УСН и АУСН для селлеров маркетплейсов — расчёт налоговой нагрузки</p>

  <!-- Input Panel -->
  <div class="input-panel">
    <h2>Введите данные</h2>
    <div class="fields">
      <div class="field">
        <label>Доходы за год, ₽</label>
        <input type="text" id="income" placeholder="38 000 000" value="38000000" />
      </div>
      <div class="field">
        <label>Расходы за год, ₽</label>
        <input type="text" id="expenses" placeholder="39 000 000" value="39000000" />
      </div>
      <div class="field">
        <label>ФОТ (фонд оплаты труда), ₽</label>
        <input type="text" id="fot" placeholder="126 000" value="126000" />
      </div>
      <div class="field">
        <label>Ставка на травматизм, %</label>
        <input type="text" id="travmatizm" placeholder="0.2" value="0.2" />
      </div>
      <div class="field">
        <label>Форма организации</label>
        <div class="org-toggle">
          <input type="radio" name="org" id="org-ip" value="ip" checked />
          <label for="org-ip">ИП</label>
          <input type="radio" name="org" id="org-ooo" value="ooo" />
          <label for="org-ooo">ООО</label>
        </div>
      </div>
    </div>
    <button class="btn-calc" onclick="calculate()">Рассчитать</button>
  </div>

  <!-- Results -->
  <div id="results">
    <div class="winner-banner" id="winner-banner">
      <div class="icon">✅</div>
      <div class="text">
        <strong id="winner-title"></strong>
        <span id="winner-subtitle"></span>
      </div>
    </div>

    <div class="cards" id="cards"></div>

    <div class="compare-section">
      <h3>Детальное сравнение</h3>
      <table class="compare-table" id="compare-table"></table>
    </div>

    <p class="note" id="note"></p>
  </div>
</div>

<script>
  // ── Константы 2025 ────────────────────────────────────────────────────────
  const C = {
    ausn_d_rate:         0.08,   // АУСН Доходы
    ausn_dmr_rate:       0.20,   // АУСН Доходы минус Расходы
    ausn_min_rate:       0.03,   // Минимальный налог АУСН
    ausn_travmatizm:     2959,   // Фиксированный взнос на травматизм в АУСН (руб/год)

    usn_d_rate:          0.06,   // УСН Доходы
    usn_dmr_rate:        0.15,   // УСН Доходы минус Расходы
    usn_min_rate:        0.01,   // Минимальный налог УСН ДмР

    nds_rate:            5/105,  // НДС 5% включён в выручку (для плательщиков НДС на УСН)

    workers_rate:        0.30,   // Взносы за работников 30%
    ip_fixed:            57390,  // Фиксированные взносы ИП 2025
    ip_1pct_threshold:   300000, // Порог для 1% взноса ИП
    ip_1pct_rate:        0.01,   // 1% с дохода выше порога
    ip_1pct_max_factor:  8,      // Максимум = 8 × фиксированные
  };

  // ── Вспомогательные ───────────────────────────────────────────────────────
  function fmt(n) {
    if (n === null || n === undefined) return '—';
    return Math.round(n).toLocaleString('ru-RU') + ' ₽';
  }

  function parseNum(str) {
    return parseFloat(String(str).replace(/\s/g, '').replace(',', '.')) || 0;
  }

  function calcIPVznosy(income_for_1pct) {
    const fixed = C.ip_fixed;
    const base = Math.max(0, income_for_1pct - C.ip_1pct_threshold);
    const additional = Math.min(base * C.ip_1pct_rate, C.ip_1pct_max_factor * fixed);
    return fixed + additional;
  }

  // ── Расчёт ───────────────────────────────────────────────────────────────
  function calculate() {
    const revenue  = parseNum(document.getElementById('income').value);
    const expenses = parseNum(document.getElementById('expenses').value);
    const fot      = parseNum(document.getElementById('fot').value);
    const trav_pct = parseNum(document.getElementById('travmatizm').value);
    const is_ip    = document.querySelector('input[name="org"]:checked').value === 'ip';

    if (!revenue) { alert('Введите доходы'); return; }

    const travmatizm_usn = fot * trav_pct / 100;
    const workers_vznosy = fot * C.workers_rate;
    const has_workers    = fot > 0;

    // ── НДС (5%, всегда включён в выручку для УСН) ──────────────────────
    const nds           = revenue * C.nds_rate;
    const revenue_ex    = revenue - nds;  // Доходы без НДС

    // ═══════════════════════════════════════════════════════════════════════
    // АУСН — Доходы
    // ═══════════════════════════════════════════════════════════════════════
    const ausn_d = (() => {
      const tax        = revenue * C.ausn_d_rate;
      const travmatizm = has_workers ? C.ausn_travmatizm : 0;
      return {
        label:    'АУСН (Доходы)',
        short:    'АУСН Д',
        nds:      0,
        tax,
        ip:       0,
        workers:  0,
        travmatizm,
        vznosy:   travmatizm,
        total:    tax + travmatizm,
      };
    })();

    // ═══════════════════════════════════════════════════════════════════════
    // АУСН — Доходы минус Расходы
    // ═══════════════════════════════════════════════════════════════════════
    const ausn_dmr = (() => {
      const net        = revenue - expenses;
      const tax_base   = net > 0 ? net * C.ausn_dmr_rate : 0;
      const min_tax    = revenue * C.ausn_min_rate;
      const tax        = Math.max(tax_base, min_tax);
      const travmatizm = has_workers ? C.ausn_travmatizm : 0;
      return {
        label:    'АУСН (Доходы − Расходы)',
        short:    'АУСН ДмР',
        nds:      0,
        tax,
        ip:       0,
        workers:  0,
        travmatizm,
        vznosy:   travmatizm,
        total:    tax + travmatizm,
      };
    })();

    // ═══════════════════════════════════════════════════════════════════════
    // УСН — Доходы
    // ═══════════════════════════════════════════════════════════════════════
    const usn_d = (() => {
      // 1% взнос ИП — на Доходы без НДС
      const ip       = is_ip ? calcIPVznosy(revenue_ex) : 0;
      const vznosy   = ip + workers_vznosy + travmatizm_usn;
      const tax_raw  = revenue_ex * C.usn_d_rate;
      // Уменьшение налога на взносы: 50% если есть работники, 100% если нет
      const max_ded  = has_workers ? tax_raw * 0.5 : tax_raw;
      const deduction = Math.min(max_ded, vznosy);
      const tax      = Math.max(0, tax_raw - deduction);
      return {
        label:    'УСН (Доходы)',
        short:    'УСН Д',
        nds,
        tax,
        ip,
        workers:  workers_vznosy,
        travmatizm: travmatizm_usn,
        vznosy,
        total:    nds + tax + vznosy,
      };
    })();

    // ═══════════════════════════════════════════════════════════════════════
    // УСН — Доходы минус Расходы
    // ═══════════════════════════════════════════════════════════════════════
    const usn_dmr = (() => {
      // 1% взнос ИП — на (Доходы − Расходы) если положительные
      const net_for_ip = Math.max(0, revenue_ex - expenses);
      const ip         = is_ip ? calcIPVznosy(net_for_ip) : 0;
      const vznosy     = ip + workers_vznosy + travmatizm_usn;
      const net        = revenue_ex - expenses;
      const min_tax    = revenue_ex * C.usn_min_rate;
      const tax_base   = net > 0 ? net * C.usn_dmr_rate : 0;
      const tax        = Math.max(tax_base, min_tax);
      return {
        label:    'УСН (Доходы − Расходы)',
        short:    'УСН ДмР',
        nds,
        tax,
        ip,
        workers:  workers_vznosy,
        travmatizm: travmatizm_usn,
        vznosy,
        total:    nds + tax + vznosy,
      };
    })();

    // ── Определяем победителя ─────────────────────────────────────────────
    const regimes = [ausn_d, ausn_dmr, usn_d, usn_dmr];
    const best    = regimes.reduce((a, b) => a.total < b.total ? a : b);
    const worst   = regimes.reduce((a, b) => a.total > b.total ? a : b);
    const saving  = worst.total - best.total;

    // ── Рендер ───────────────────────────────────────────────────────────
    renderResults(regimes, best, saving, is_ip, has_workers);
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderResults(regimes, best, saving, is_ip, has_workers) {
    // Winner banner
    document.getElementById('winner-title').textContent =
      `Выгоднее всего: ${best.label}`;
    document.getElementById('winner-subtitle').textContent =
      `Экономия до ${Math.round(saving).toLocaleString('ru-RU')} ₽ по сравнению с самым дорогим вариантом`;

    // Cards
    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = regimes.map(r => {
      const isBest = r === best;
      return `
        <div class="card ${isBest ? 'best' : ''}">
          <div class="badge">Выгоднее всего</div>
          <div class="regime">${r.short}</div>
          <div class="total">${fmt(r.total)}</div>
          <div class="rows">
            ${r.nds ? `<div class="row"><span>НДС (5%)</span><span class="val">${fmt(r.nds)}</span></div>` : ''}
            <div class="row"><span>Налог</span><span class="val">${fmt(r.tax)}</span></div>
            <div class="row"><span>Взносы</span><span class="val">${fmt(r.vznosy)}</span></div>
            ${r.ip ? `<div class="row sub"><span>— ИП (фикс.+1%)</span><span class="val">${fmt(r.ip)}</span></div>` : ''}
            ${r.workers ? `<div class="row sub"><span>— за работников</span><span class="val">${fmt(r.workers)}</span></div>` : ''}
            <div class="row sub"><span>— травматизм</span><span class="val">${fmt(r.travmatizm)}</span></div>
          </div>
        </div>`;
    }).join('');

    // Comparison table
    const bestIdx = regimes.indexOf(best);
    const headers = regimes.map((r, i) =>
      `<th class="${i === bestIdx ? 'best-col' : ''}">${r.short}</th>`
    ).join('');

    const rows = [
      { label: 'НДС', key: 'nds' },
      { label: 'Налог', key: 'tax' },
      { label: 'Взносы — итого', key: 'vznosy' },
      { label: '↳ ИП (фикс. + 1%)', key: 'ip' },
      { label: '↳ За работников', key: 'workers' },
      { label: '↳ Травматизм', key: 'travmatizm' },
    ];

    const bodyRows = rows.map(row => {
      const cells = regimes.map((r, i) => {
        const val = r[row.key];
        const cls = i === bestIdx ? 'best-col' : '';
        return `<td class="${cls}">${val ? fmt(val) : '—'}</td>`;
      }).join('');
      return `<tr><td>${row.label}</td>${cells}</tr>`;
    }).join('');

    const totalCells = regimes.map((r, i) => {
      const cls = i === bestIdx ? 'best-col' : '';
      return `<td class="${cls}">${fmt(r.total)}</td>`;
    }).join('');

    document.getElementById('compare-table').innerHTML = `
      <thead><tr><th>Показатель</th>${headers}</tr></thead>
      <tbody>
        ${bodyRows}
        <tr class="total-row"><td>ИТОГО нагрузка</td>${totalCells}</tr>
      </tbody>`;

    // Notes
    const notes = [];
    if (!is_ip) notes.push('* Для ООО взносы ИП «за себя» не применяются.');
    if (!has_workers) notes.push('* ФОТ = 0: взносы на травматизм не начисляются.');
    notes.push('* НДС 5% рассчитан как включённый в выручку (для плательщиков НДС на УСН).');
    notes.push('* Расчёт по ставкам 2025 года. Проконсультируйтесь с бухгалтером для точной оценки.');
    document.getElementById('note').textContent = notes.join(' ');
  }

  // Авторасчёт по Enter
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });

  // Первичный расчёт при загрузке
  window.addEventListener('load', calculate);
</script>

</body>
</html>
